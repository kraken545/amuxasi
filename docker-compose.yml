version: "3.9"

services:
  amuxasi:
    build: .
    container_name: amuxasi
    ports:
      - "7000:7000"
    env_file:
      - .env
    environment:
      - AMUXASI_PORT=7000
      - AMUXASI_WORKSPACE=/workspace
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      # Mount your project repo to /workspace
      - .:/workspace
      # Persist config and cache
      - amuxasi-config:/home/amuxasi/.config/amuxasi
      - amuxasi-cache:/home/amuxasi/.cache/amuxasi
    restart: unless-stopped

volumes:
  amuxasi-config:
  amuxasi-cache:
