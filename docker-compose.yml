services:
  amuxasi:
    build: .
    container_name: amuxasi
    ports:
      - "7001:7000"
    environment:
      - AMUXASI_PORT=7000
      - AMUXASI_WORKSPACE=/workspace
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      # Monta tu proyecto en /workspace
      - .:/workspace
      # Persiste configuración y caché
      - amuxasi-config:/home/amuxasi/.config/amuxasi
      - amuxasi-cache:/home/amuxasi/.cache/amuxasi
    restart: unless-stopped

volumes:
  amuxasi-config:
  amuxasi-cache:
